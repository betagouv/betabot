name: Eval

on:
  pull_request:
    paths:
      - "src/tools/**"
      - "src/orchestrator.ts"
      - "evals/fixtures.json"
      - "evals/run.ts"
      - "prompt.md"
  push:
    branches: [main]
    paths:
      - "src/tools/**"
      - "src/orchestrator.ts"
      - "evals/fixtures.json"
      - "evals/run.ts"
      - "prompt.md"

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Download the last eval result from the base branch to enable diffing.
      # Silently skipped on the first ever run or if the base has no artifact yet.
      - name: Download base eval result
        if: github.event_name == 'pull_request'
        id: base
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: eval.yml
          branch: ${{ github.base_ref }}
          name: eval-result
          path: evals/results/base

      - name: Run eval
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          mkdir -p evals/results
          node --import tsx evals/run.ts
          # Copy latest timestamped result to a fixed name for artifact upload
          cp "$(ls -t evals/results/*.json | head -1)" evals/results/result.json

      - name: Upload eval result
        uses: actions/upload-artifact@v4
        with:
          name: eval-result
          path: evals/results/result.json
          retention-days: 90

      - name: Generate markdown report
        run: |
          BASE=""
          if [ -f "evals/results/base/result.json" ]; then
            BASE="evals/results/base/result.json"
          fi
          node --import tsx evals/report.ts evals/results/result.json $BASE > evals/report.md
          cat evals/report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: eval
          path: evals/report.md
